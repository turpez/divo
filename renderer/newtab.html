<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Divo</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #111113; color: #f5f5f7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }

    .top-actions {
      position: fixed;
      top: 12px;
      right: 12px;
      display: flex;
      gap: 2px;
    }

    .action-btn {
      width: 32px;
      height: 32px;
      background: none;
      border: none;
      color: #48484a;
      cursor: pointer;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, color .15s;
    }

    .action-btn:hover {
      background: #1c1c1e;
      color: #8e8e93;
    }

    .page { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }

    .greeting { font-size: 12px; color: #48484a; letter-spacing: .1em; text-transform: uppercase; font-weight: 500; margin-bottom: 14px; }
    .time { font-size: 90px; font-weight: 100; letter-spacing: -4px; color: #f5f5f7; line-height: 1; font-variant-numeric: tabular-nums; }
    .date { font-size: 14px; color: #3a3a3c; margin-top: 10px; margin-bottom: 52px; letter-spacing: .03em; }

    .search-wrap { position: relative; width: 440px; }
    .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #3a3a3c; pointer-events: none; transition: color .15s; }
    .search-wrap:focus-within .search-icon { color: #636366; }
    .search { width: 100%; background: #1c1c1e; border: 1px solid #2a2a2c; border-radius: 14px; padding: 14px 20px 14px 46px; color: #f5f5f7; font-size: 14px; outline: none; transition: border-color .15s, box-shadow .15s, background .15s; user-select: text; }
    .search::placeholder { color: #3a3a3c; }
    .search:focus { background: #1e1e20; border-color: #3a3a3c; box-shadow: 0 0 0 3px rgba(10,132,255,.18); }

    .watermark { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); font-size: 11px; color: #1e1e20; letter-spacing: .08em; user-select: none; }
  </style>
</head>
<body>
  <div class="top-actions">
    <button class="action-btn" id="btn-bitwarden" title="Bitwarden">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="19" height="18" rx="2"/>
        <circle cx="11" cy="12" r="3"/>
        <line x1="11" y1="9"  x2="11" y2="7"/>
        <line x1="11" y1="15" x2="11" y2="17"/>
        <line x1="8"  y1="12" x2="6"  y2="12"/>
        <line x1="14" y1="12" x2="16" y2="12"/>
        <path d="M21 7v2M21 15v2"/>
      </svg>
    </button>
    <button class="action-btn" id="btn-ext" title="Extensions">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M20.5 11H19V7a2 2 0 0 0-2-2h-4V3.5a2.5 2.5 0 0 0-5 0V5H4a2 2 0 0 0-2 2v3.5h1.5a2.5 2.5 0 0 1 0 5H2V20a2 2 0 0 0 2 2h3.5v-1.5a2.5 2.5 0 0 1 5 0V22H17a2 2 0 0 0 2-2v-4h1.5a2.5 2.5 0 0 0 0-5z"/>
      </svg>
    </button>
    <button class="action-btn" id="btn-settings" title="Paramètres">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"></path>
      </svg>
    </button>
  </div>

  <div class="page">
    <div class="greeting" id="greeting"></div>
    <div class="time" id="time"></div>
    <div class="date" id="date"></div>

    <div class="search-wrap">
      <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input id="search" class="search" type="text" placeholder="Rechercher ou entrer une URL…" autocomplete="off" spellcheck="false">
    </div>
  </div>

  <div class="watermark">Divo</div>

  <script>
    const DAYS = ['Dimanche', 'Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi']
    const MONTHS = ['janvier', 'février', 'mars', 'avril', 'mai', 'juin', 'juillet', 'août', 'septembre', 'octobre', 'novembre', 'décembre']
    const ENGINES = {
      google:     'https://www.google.com/search?q=',
      duckduckgo: 'https://duckduckgo.com/?q=',
      bing:       'https://www.bing.com/search?q=',
      qwant:      'https://www.qwant.com/?q=',
      brave:      'https://search.brave.com/search?q=',
    }

    function update() {
      const now = new Date(), h = now.getHours()
      document.getElementById('time').textContent = String(h).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0')
      document.getElementById('date').textContent = DAYS[now.getDay()] + ' ' + now.getDate() + ' ' + MONTHS[now.getMonth()]
      document.getElementById('greeting').textContent = h < 5 ? 'Bonne nuit' : h < 12 ? 'Bonjour' : h < 18 ? 'Bon après-midi' : 'Bonsoir'
    }
    update()
    const s = new Date().getSeconds()
    setTimeout(() => { update(); setInterval(update, 60000) }, (60 - s) * 1000)

    document.getElementById('search').addEventListener('keydown', e => {
      if (e.key !== 'Enter') return
      const val = e.target.value.trim()
      if (!val) return
      if (val.startsWith('http://') || val.startsWith('https://')) { window.location.href = val; return }
      if (/^[\w-]+\.[\w.-]+/.test(val) && !val.includes(' ')) { window.location.href = 'https://' + val; return }
      const base = ENGINES[window.__divoEngine] || ENGINES.google
      window.location.href = base + encodeURIComponent(val)
    })

    document.getElementById('btn-bitwarden').addEventListener('click', () => {
      window.location.href = 'https://vault.bitwarden.com/#/login'
    })

    document.getElementById('btn-settings').addEventListener('click', () => {
      window.location.href = 'divo://settings'
    })

    document.getElementById('btn-ext').addEventListener('click', () => {
      document.title = 'divo-action:ext-install'
    })
  </script>
</body>
</html>
