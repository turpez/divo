<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Divo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <!-- Barre de titre -->
  <div class="titlebar">
    <button class="titlebar-btn" id="btn-toggle-sidebar" title="Sidebar (Ctrl+B)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="3" y="3" width="18" height="18" rx="2"></rect>
        <line x1="9" y1="3" x2="9" y2="21"></line>
      </svg>
    </button>
    <img class="titlebar-favicon" id="titlebar-favicon" draggable="false">
    <span class="app-name" id="app-name">Divo</span>

    <div class="win-controls">
      <button class="win-btn minimize" id="btn-minimize">
        <svg width="10" height="1" viewBox="0 0 10 1"><line x1="0" y1="0.5" x2="10" y2="0.5" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
      <button class="win-btn maximize" id="btn-maximize">
        <svg width="10" height="10" viewBox="0 0 10 10"><rect x="0.6" y="0.6" width="8.8" height="8.8" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
      </button>
      <button class="win-btn close" id="btn-close">
        <svg width="10" height="10" viewBox="0 0 10 10">
          <line x1="0" y1="0" x2="10" y2="10" stroke="currentColor" stroke-width="1.2"/>
          <line x1="10" y1="0" x2="0"  y2="10" stroke="currentColor" stroke-width="1.2"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Top layout : nav bar -->
  <div class="top-nav-bar" id="top-nav-bar">
    <button class="nav-btn" id="top-btn-back" disabled title="Retour">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
    <button class="nav-btn" id="top-btn-forward" disabled title="Suivant">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
    </button>
    <input type="text" id="top-url-input" class="url-bar top-url-bar" placeholder="Rechercher ou entrer une URL…" autocomplete="off" spellcheck="false">
    <button class="nav-btn" id="top-btn-mute" title="Couper le son">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
    </button>
    <button class="nav-btn" id="top-btn-reload" title="Recharger">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
    </button>
  </div>

  <!-- Top layout : tab bar -->
  <div class="top-tab-bar" id="top-tab-bar">
    <ul class="top-tabs-list" id="top-tabs-list"></ul>
    <button class="top-new-tab-btn" id="top-btn-new-tab" title="Nouvel onglet">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </button>
  </div>

  <!-- Corps -->
  <div class="app-body">

    <aside class="sidebar">
      <div class="resize-handle" id="resize-handle"></div>

      <!-- Espaces -->
      <div class="spaces-row">
        <div class="spaces-list" id="spaces-list"></div>
        <button class="space-add-btn" id="btn-add-space" title="Nouvel espace">+</button>
      </div>

      <!-- Barre de navigation -->
      <div class="nav-row">
        <button class="nav-btn" id="btn-back" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <button class="nav-btn" id="btn-forward" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
        <input type="text" id="url-input" class="url-bar" placeholder="Rechercher ou entrer une URL…" autocomplete="off" spellcheck="false">
        <button class="nav-btn" id="btn-mute" title="Couper le son">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
        </button>
        <button class="nav-btn" id="btn-reload" title="Recharger">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
        </button>
      </div>

      <!-- Essentials -->
      <div class="section">
        <div class="section-header">
          <span class="section-label">Essentials</span>
          <button class="section-add" id="btn-add-essential" title="Épingler la page actuelle">
            <svg width="11" height="11" viewBox="0 0 11 11">
              <line x1="5.5" y1="1" x2="5.5" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="1" y1="5.5" x2="10" y2="5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <ul class="tab-list" id="essentials-list"></ul>
      </div>

      <!-- Favoris -->
      <div class="section" id="favorites-section">
        <div class="section-header">
          <span class="section-label">Favoris</span>
          <button class="section-add" id="btn-add-folder" title="Nouveau dossier de favoris">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
              <line x1="12" y1="11" x2="12" y2="17"></line>
              <line x1="9" y1="14" x2="15" y2="14"></line>
            </svg>
          </button>
          <button class="section-add" id="btn-import-bookmarks" title="Importer depuis un fichier .htm (Chrome / Firefox / Edge…)">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
          </button>
          <button class="section-add" id="btn-add-favorite" title="Ajouter la page aux favoris">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
            </svg>
          </button>
        </div>
        <ul class="tab-list" id="favorites-list"></ul>
      </div>

      <div class="divider"></div>

      <!-- Onglets -->
      <div class="section tabs-section">
        <ul class="tab-list" id="tabs-list"></ul>
      </div>

      <!-- Archivés -->
      <div class="section archive-section" id="archive-section" style="display:none">
        <div class="section-header">
          <span class="section-label">Archivés</span>
        </div>
        <ul class="tab-list" id="archive-list"></ul>
      </div>

      <!-- Mini player -->
      <div class="mini-player" id="mini-player">
        <img class="mini-player-favicon" id="mini-player-favicon" draggable="false">
        <span class="mini-player-title" id="mini-player-title"></span>
        <div class="mini-player-controls">
          <button class="mini-player-btn" id="mini-player-pip" title="Picture-in-Picture">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="2"/><rect x="12" y="13" width="9" height="7" rx="1" fill="currentColor" stroke="none"/></svg>
          </button>
          <button class="mini-player-btn" id="mini-player-go" title="Aller à l'onglet">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
      </div>

      <!-- Footer -->
      <div class="sidebar-footer">
        <button class="dl-toggle-btn" id="btn-settings" title="Paramètres">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"></path>
          </svg>
        </button>
<button class="dl-toggle-btn" id="btn-downloads" title="Téléchargements">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
        </button>
        <button class="new-tab-btn private-btn" id="btn-new-private" title="Ctrl+Shift+N">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          Privé
        </button>
      </div>
    </aside>

    <!-- Contenu web -->
    <main class="content">
      <!-- Barre de mise à jour -->
      <div class="update-bar" id="update-bar">
        <span id="update-msg">Mise à jour disponible</span>
        <button class="update-install-btn" id="update-install-btn">Installer</button>
        <button class="update-dismiss-btn" id="update-dismiss-btn">✕</button>
      </div>

      <webview id="webview" allowpopups></webview>
      <webview id="webview-private" partition="private:incognito" allowpopups style="display:none"></webview>
      <webview id="webview-bg" allowpopups style="display:none"></webview>

      <!-- Barre de permission -->
      <div class="permission-bar" id="permission-bar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#febc2e" stroke-width="2" stroke-linecap="round" style="flex-shrink:0">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
        </svg>
        <span id="perm-text">Ce site demande accès à votre localisation</span>
        <button class="perm-btn allow" id="perm-allow">Autoriser</button>
        <button class="perm-btn deny"  id="perm-deny">Refuser</button>
        <button class="perm-dismiss"   id="perm-dismiss">✕</button>
      </div>

      <div class="progress-bar"  id="progress-bar"></div>

      <div class="find-bar" id="find-bar">
        <input type="text" id="find-input" placeholder="Rechercher dans la page…" autocomplete="off" spellcheck="false">
        <span class="find-count" id="find-count"></span>
        <button class="find-nav" id="find-prev">↑</button>
        <button class="find-nav" id="find-next">↓</button>
        <button class="find-nav" id="find-close">✕</button>
      </div>

      <div class="history-panel" id="history-panel">
        <div class="history-header">
          <span class="history-title">Historique</span>
          <button id="history-clear">Tout effacer</button>
          <button id="history-close">✕</button>
        </div>
        <div class="history-list" id="history-list"></div>
      </div>

      <div class="dl-bar" id="dl-bar">
        <div class="dl-list" id="dl-list"></div>
        <div class="dl-actions">
          <button class="dl-folder-btn" id="dl-folder-btn" title="Dossier Téléchargements">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
            </svg>
          </button>
          <button class="dl-close-btn" id="dl-close-btn">✕</button>
        </div>
      </div>

      <div class="context-menu" id="context-menu"></div>
    </main>

  </div>
</div>
<script src="app.js"></script>
</body>
</html>
