name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        run: |
          gh release delete "${{ github.ref_name }}" --repo "${{ github.repository }}" --yes 2>/dev/null || true
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "Divo ${{ github.ref_name }}" \
            --notes "## Divo ${{ github.ref_name }}" \
            --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Build Windows
        run: npx electron-builder --win --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Upload Windows artifacts
        run: |
          $files = Get-ChildItem dist\*.exe | Select-Object -ExpandProperty FullName
          foreach ($f in $files) {
            gh release upload "${{ github.ref_name }}" $f --clobber
          }
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools rpm fakeroot
      - run: npm install
      - name: Build Linux
        run: npm run build:linux -- --publish never
      - name: Upload AppImage
        run: gh release upload "${{ github.ref_name }}" dist/*.AppImage --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
