name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools rpm fakeroot
      - run: npm install
      - name: Build Linux
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload AppImage to release
        run: gh release upload ${{ github.ref_name }} dist/*.AppImage --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
