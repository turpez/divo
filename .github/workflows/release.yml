name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools rpm fakeroot
      - run: npm install
      - name: Build Linux
        run: npm run build:linux -- --publish never
      - name: Upload AppImage to release
        run: |
          for i in $(seq 1 30); do
            if gh release view "${{ github.ref_name }}" > /dev/null 2>&1; then
              gh release upload "${{ github.ref_name }}" dist/*.AppImage --clobber
              exit 0
            fi
            echo "Attempt $i/30: release not found, waiting 20s..."
            sleep 20
          done
          echo "Release not found after 10 min — creating fallback release..."
          gh release create "${{ github.ref_name }}" \
            --title "Divo ${{ github.ref_name }}" \
            --notes "Linux AppImage" \
            dist/*.AppImage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
